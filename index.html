<!DOCTYPE html>
<html lang="ru">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
  <meta name="description" content="Кликер 67 — жми на 67, покупай улучшения, открывай достижения и соревнуйся в рейтинге очков.">
  <title>Кликер 67</title>
  <link rel="stylesheet" href="css/style.css">
</head>
<body>
  <div id="loader" class="loader">
    <div class="loader-num">67</div>
    <p id="loader-text">Загрузка...</p>
  </div>

  <div id="app" class="app hidden">
    <header class="header">
      <div class="header-top">
        <h1 class="title" data-i18n="title">Кликер 67</h1>
        <button type="button" id="btn-sound" class="icon-btn" aria-label="Звук">🔊</button>
      </div>
      <div class="stats-bar">
        <div class="stat">
          <span class="stat-label" data-i18n="points">Очки</span>
          <span id="score" class="stat-value">0</span>
        </div>
        <div class="stat">
          <span class="stat-label" data-i18n="perSec">/ сек</span>
          <span id="per-sec" class="stat-value">0</span>
        </div>
        <div class="stat">
          <span class="stat-label" data-i18n="clicks">Кликов</span>
          <span id="total-clicks" class="stat-value">0</span>
        </div>
      </div>
      <div class="progress-wrap">
        <div class="progress-label">
          <span data-i18n="progressLabel">Прогресс</span>
          <span id="progress-text" class="progress-value">0%</span>
        </div>
        <div class="progress-track">
          <div id="progress-bar" class="progress-fill"></div>
        </div>
      </div>
    </header>

    <main class="main">
      <div class="play-col">
        <section class="click-zone">
          <button type="button" id="btn-click" class="click-btn" aria-label="Клик">
            <span class="click-num">67</span>
            <span class="click-hint" data-i18n="tapHint">Жми!</span>
          </button>
          <div id="float-container" class="float-container" aria-hidden="true"></div>
        </section>

        <section class="actions">
          <button type="button" id="btn-reward" class="action-btn reward">
            <span data-i18n="rewardBtn">×2 на 20 сек (реклама)</span>
          </button>
          <button type="button" id="btn-save" class="action-btn secondary">
            <span data-i18n="saveBtn">Сохранить</span>
          </button>
        </section>
      </div>

      <div class="panels-col">
        <nav class="tabs" role="tablist">
          <button type="button" class="tab active" data-tab="upgrades" role="tab" data-i18n="tabUpgrades">Улучшения</button>
          <button type="button" class="tab" data-tab="achievements" role="tab" data-i18n="tabAchievements">Достижения</button>
          <button type="button" class="tab" data-tab="leaders" role="tab" data-i18n="tabLeaders">Лидеры</button>
          <button type="button" class="tab" data-tab="shop" role="tab" data-i18n="tabShop">Магазин</button>
        </nav>

        <section id="panel-upgrades" class="panel active" role="tabpanel">
          <ul id="upgrades-list" class="upgrades-list"></ul>
        </section>

        <section id="panel-achievements" class="panel" role="tabpanel">
          <ul id="achievements-list" class="achievements-list"></ul>
        </section>

        <section id="panel-leaders" class="panel" role="tabpanel">
          <div class="name-box">
            <label class="name-label" for="nickname-input" data-i18n="nameLabel">Ваше имя в рейтинге</label>
            <div class="name-row">
              <input type="text" id="nickname-input" class="name-input" maxlength="20"
                     autocomplete="off" autocapitalize="off" spellcheck="false" inputmode="text"
                     data-i18n-ph="namePlaceholder" placeholder="Введите имя">
              <button type="button" id="btn-name-save" class="name-save" data-i18n="nameSave">ОК</button>
            </div>
            <p id="name-hint" class="name-hint"></p>
          </div>
          <ol id="leaders-list" class="leaders-list"></ol>
          <p id="leaders-status" class="leaders-status" data-i18n="leadersLoading">Загрузка таблицы лидеров...</p>
          <button type="button" id="btn-auth" class="action-btn secondary hidden" data-i18n="authBtn">Войти, чтобы попасть в рейтинг</button>
        </section>

        <section id="panel-shop" class="panel" role="tabpanel">
          <ul id="shop-list" class="shop-list"></ul>
          <p id="shop-status" class="shop-status hidden"></p>
        </section>
      </div>
    </main>

    <footer class="footer">
      <span id="boost-indicator" class="boost hidden" data-i18n="boostActive">Буст ×2!</span>
      <span id="save-status" class="save-status"></span>
    </footer>
  </div>

  <script src="/sdk.js"></script>
  <script src="js/i18n.js"></script>
  <script src="js/sdk-bridge.js"></script>
  <script src="js/game.js"></script>
</body>
</html>
